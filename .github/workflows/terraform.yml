name: AKS-Cluster-Action
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

    #fg

jobs:

  validates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3

      # - name: tf.fmt
      #   run:  terraform fmt -check -recursive

      - name: tf.init
        run: terraform init

      - name: tf.validate
        run: terraform validate
      
  tflint:
   needs: validates
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v6

     - uses: terraform-linters/setup-tflint@v4

     - name: tflinter install and check
       run: |
         tflint --init
         tflint
      
  tfsec:
   needs: tflint
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v6
      
     - name: tfsec
       uses: aquasecurity/tfsec-action@v1.0.3

  plan:
   needs: tfsec
   runs-on: ubuntu-latest

   steps:
     - uses: actions/checkout@v6

     - uses: hashicorp/setup-terraform@v3

     - name: tf.init
       run: terraform init

     - name: tf.plan
       run: terraform plan

  apply:
   needs: plan
   runs-on: ubuntu-latest

   steps:
     - uses:  actions/checkout@v6

     - uses: hashicorp/setup-terraform@v3

     - name: terraform init
       run:  terraform init

     - name: terraform apply
       run: terraform apply
       
    
       
       
  
  
  
  
